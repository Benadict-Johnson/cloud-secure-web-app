<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Press Start 2P', cursive; }
        .pixel-shadow { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .pixel-shadow-sm { box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); }
        .pixel-shadow:active { box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); transform: translate(4px, 4px); }
    </style>
</head>
<body class="bg-[#8b9bb4] min-h-screen text-black">
    <nav class="bg-[#ffb86c] border-b-4 border-black p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-sm md:text-lg text-black uppercase">My Quests</h1>
            <div class="flex items-center space-x-4">
                <span class="text-[10px] hidden md:inline">Player: {{ current_user.username }}</span>
                <a href="{{ url_for('logout') }}" class="text-[10px] bg-white border-2 border-black pixel-shadow-sm hover:bg-gray-200 px-3 py-2 uppercase transition-transform active:translate-y-0.5 active:translate-x-0.5 active:shadow-none">Logout</a>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto mt-8 p-4 grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- New Task Form -->
        <div class="md:col-span-1">
            <div class="bg-white p-6 border-4 border-black pixel-shadow">
                <h2 class="text-xs mb-6 uppercase text-center">New Quest</h2>
                <form method="POST" class="space-y-4">
                    <div>
                        <label class="block text-[10px] mb-2 uppercase">Title</label>
                        <input type="text" name="title" required class="w-full px-2 py-3 bg-white border-4 border-black focus:outline-none pixel-shadow-sm text-[10px]">
                    </div>
                    <div>
                        <label class="block text-[10px] mb-2 uppercase">Description</label>
                        <textarea name="description" rows="4" class="w-full px-2 py-3 bg-white border-4 border-black focus:outline-none pixel-shadow-sm text-[10px]"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-[#50fa7b] hover:bg-[#69ff8f] text-black text-[10px] py-4 border-4 border-black pixel-shadow transition-transform uppercase mt-4">
                        Add Quest
                    </button>
                </form>
            </div>
        </div>

        <!-- Task List -->
        <div class="md:col-span-2 space-y-6">
            {% if tasks %}
                {% for task in tasks %}
                <div class="bg-white p-5 border-4 border-black pixel-shadow flex flex-col md:flex-row justify-between items-start md:items-center">
                    <div class="mb-4 md:mb-0 max-w-full overflow-hidden">
                        <h3 class="text-xs uppercase mb-2 truncate">{{ task.title }}</h3>
                        <p class="text-[10px] text-gray-600 mb-3 break-words whitespace-pre-wrap leading-relaxed">{{ task.description }}</p>
                        <p class="text-[8px] text-gray-500">Created: {{ task.created_at.strftime('%Y-%m-%d') }}</p>
                    </div>
                    <form method="POST" action="{{ url_for('delete_task', task_id=task.id) }}" class="shrink-0 mt-4 md:mt-0">
                        <button type="submit" class="bg-[#ff5555] hover:bg-[#ff6e6e] text-white text-[10px] px-3 py-2 border-2 border-black pixel-shadow-sm transition-transform active:translate-y-0.5 active:translate-x-0.5 active:shadow-none uppercase">
                            Drop
                        </button>
                    </form>
                </div>
                {% endfor %}
            {% else %}
                <div class="bg-white p-8 border-4 border-black pixel-shadow text-center">
                    <p class="text-xs uppercase leading-loose text-gray-500">No quests found.<br><br>Embark on a new one!</p>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
