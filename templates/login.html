<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Press Start 2P', cursive; }
        .pixel-shadow { box-shadow: 4px 4px 0px 0px rgba(0,0,0,1); }
        .pixel-shadow-sm { box-shadow: 2px 2px 0px 0px rgba(0,0,0,1); }
        .pixel-shadow:active { box-shadow: 0px 0px 0px 0px rgba(0,0,0,1); transform: translate(4px, 4px); }
    </style>
</head>
<body class="bg-[#8b9bb4] min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-6 w-full max-w-md border-4 border-black pixel-shadow">
        <h2 class="text-xl mb-8 text-center text-black uppercase leading-relaxed">Login</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-500 text-white p-3 mb-6 text-xs text-center border-4 border-black pixel-shadow-sm leading-relaxed">
                    {{ messages[0] }}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-xs text-black mb-2 uppercase">Username</label>
                <input type="text" name="username" required class="w-full px-3 py-3 bg-white border-4 border-black text-black placeholder-gray-400 focus:outline-none pixel-shadow-sm text-xs">
            </div>
            <div>
                <label class="block text-xs text-black mb-2 uppercase">Password</label>
                <input type="password" name="password" required class="w-full px-3 py-3 bg-white border-4 border-black text-black placeholder-gray-400 focus:outline-none pixel-shadow-sm text-xs">
            </div>
            <button type="submit" class="w-full bg-[#8be9fd] hover:bg-[#a4ffff] text-black text-xs py-4 border-4 border-black pixel-shadow transition-transform uppercase mt-4">
                Start Game
            </button>
        </form>
        <div class="mt-6 text-center text-[10px]">
            <span class="text-black">New Player?</span>
            <br><br>
            <a href="{{ url_for('register') }}" class="text-[#ff79c6] bg-black px-2 py-1 uppercase hover:bg-gray-800">Register here</a>
        </div>
    </div>
</body>
</html>
