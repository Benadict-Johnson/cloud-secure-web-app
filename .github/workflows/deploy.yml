name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Run Security Audits
    runs-on: ubuntu-latest  # Security scan still runs on GitHub's cloud for isolated scaling
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Security Tools
        run: pip install bandit

      - name: Run Bandit Static Application Security Testing (SAST)
        run: bandit -r . -x ./venv,./tests --severity-level high

  deploy:
    name: Deploy to AWS EC2
    needs: security-scan
    runs-on: self-hosted  # 🚨 This tells GitHub to run these steps directly inside your EC2 server!
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Deployment Commands Natively
        run: |
          cd /var/www/task-manager
          
          # Pull latest changes securely
          git pull origin main
          
          # Rebuild and replace Docker container seamlessly
          sudo docker build -t task-manager-app .
          sudo docker rm -f app-container || true
          sudo docker run -d --name app-container -p 127.0.0.1:8000:8000 --restart unless-stopped --env-file .env task-manager-app
